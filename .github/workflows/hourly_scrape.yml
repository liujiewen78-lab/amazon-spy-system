name: Amazon Spy - Hourly Product Research

on:
  schedule:
    # Run at the top of every hour (UTC)
    - cron: '0 * * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SCRAPER_DELAY_MIN: "3"
          SCRAPER_DELAY_MAX: "8"
        run: python scrapers/main.py

      - name: Run analyzer
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python analyzer/main.py

      - name: Generate report
        run: python analyzer/report_generator.py

      - name: Commit data files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Amazon Spy Bot"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Hourly update: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git push

  deploy-pages:
    needs: scrape-and-analyze
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
