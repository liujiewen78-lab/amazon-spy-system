name: Amazon Spy — 每小时选品雷达

on:
  schedule:
    - cron: '0 * * * *'   # 每小时整点运行（UTC）
  workflow_dispatch:        # 支持手动触发

permissions:
  contents: write           # 允许推送 docs/ 数据

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper (headless)
        env:
          CI: 'true'
          PYTHONPATH: ${{ github.workspace }}/scrapers
        run: |
          python scrapers/main_browser.py
        continue-on-error: true   # 采集失败不阻断后续分析

      - name: Run analyzer
        run: python analyzer/main.py

      - name: Generate report
        run: python analyzer/report_generator.py

      - name: Commit & push docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "📊 Auto-update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
